name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/ci.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "app/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-contracts:
    name: Static Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Android bridge contract
        shell: pwsh
        run: ./scripts/verify.ps1 -StaticOnly

  flutter-quality:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test --reporter expanded

  android-debug-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [static-contracts, flutter-quality]
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  windows-debug-build:
    name: Windows Debug Build
    runs-on: windows-latest
    timeout-minutes: 30
    needs: flutter-quality
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows debug app
        run: flutter build windows --debug
